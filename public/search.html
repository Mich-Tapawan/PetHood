<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetHood — Search</title>
    <link rel="icon" href="assets/brand-logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/search.css" />
    <link rel="stylesheet" href="css/leaflet.css" />
  </head>
  <body class="search-page">
    <!-- ═══════════════════ NAVBAR ═══════════════════ -->
    <nav class="navbar fixed-top navbar-expand-lg" id="navbar">
      <div class="container-lg">
        <a class="navbar-brand" href="index.html">
          <div class="brand-paw">
            <svg
              viewBox="0 0 64 64"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <ellipse cx="32" cy="40" rx="14" ry="12" fill="currentColor" />
              <ellipse cx="14" cy="28" rx="7" ry="9" fill="currentColor" />
              <ellipse cx="50" cy="28" rx="7" ry="9" fill="currentColor" />
              <ellipse cx="22" cy="16" rx="5" ry="7" fill="currentColor" />
              <ellipse cx="42" cy="16" rx="5" ry="7" fill="currentColor" />
            </svg>
          </div>
          PetHood
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#product-sec">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#service-sec">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active nav-search-link" href="#">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Search
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ═══════════════════ SEARCH BAR ═══════════════════ -->
    <div class="search-strip" id="search-container">
      <div class="container-lg">
        <div class="search-strip-inner">
          <div class="search-pill-wrap">
            <svg
              class="search-strip-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="search"
              placeholder="Enter a location (e.g. City, Province, Region)"
              autocomplete="off"
            />
            <button id="search-btn" aria-label="Search">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
          </div>
          <div class="search-strip-actions">
            <div class="btn-group filter-group">
              <button
                type="button"
                class="filter-btn dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-haspopup="true"
                aria-expanded="false"
              >
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <line x1="8" y1="6" x2="21" y2="6" />
                  <line x1="8" y1="12" x2="21" y2="12" />
                  <line x1="8" y1="18" x2="21" y2="18" />
                  <line x1="3" y1="6" x2="3.01" y2="6" />
                  <line x1="3" y1="12" x2="3.01" y2="12" />
                  <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                <span id="filter-label">All Types</span>
              </button>
              <div class="dropdown-menu">
                <button class="dropdown-item" type="button" data-type="All">
                  All
                </button>
                <button
                  class="dropdown-item"
                  type="button"
                  data-type="pet shop"
                >
                  Pet Shop
                </button>
                <button
                  class="dropdown-item"
                  type="button"
                  data-type="grooming"
                >
                  Grooming Service
                </button>
                <button
                  class="dropdown-item"
                  type="button"
                  data-type="pet training"
                >
                  Pet Training
                </button>
                <button
                  class="dropdown-item"
                  type="button"
                  data-type="veterinary clinic"
                >
                  Veterinary Clinic
                </button>
              </div>
            </div>
            <button id="favorites" class="fav-btn" disabled>
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
              Favorites
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════ MAIN ═══════════════════ -->
    <main class="search-main">
      <div class="container-lg h-100">
        <div class="search-layout">
          <!-- Results panel -->
          <aside class="results-panel">
            <!-- Loading state -->
            <div class="results-loading d-none" id="results-loading">
              <div class="loading-dots">
                <span></span><span></span><span></span>
              </div>
              <p>Finding locations…</p>
            </div>

            <!-- Empty state -->
            <div class="results-empty" id="search-none">
              <div class="empty-illustration">
                <img src="assets/gray-cat.png" alt="Sleeping cat" />
              </div>
              <h3>Where to, furparent?</h3>
              <p>
                Enter a city, province, or region to discover pet-friendly spots
                near you.
              </p>
            </div>

            <!-- Favorites list -->
            <div class="favorites-container" id="favorites-container">
              <ul id="fav-list" class="result-list"></ul>
            </div>

            <!-- Search results -->
            <div
              class="results-header"
              id="results-header"
              style="display: none"
            >
              <p>Results for: <strong id="search-indicator"></strong></p>
            </div>
            <ul id="result-list" class="result-list"></ul>
          </aside>

          <!-- Map panel -->
          <div class="map-panel">
            <div class="map-wrap" id="map-wrap">
              <div id="map"></div>
              <button
                id="return-btn"
                class="map-return"
                aria-label="Back to list"
                style="display: none"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <polyline points="15 18 9 12 15 6" />
                </svg>
                Back
              </button>
            </div>
            <div class="map-detail" id="map-detail" style="display: none">
              <h2 id="loc-name"></h2>
              <p id="loc-add"></p>
            </div>
            <p class="map-credit">Map data © OpenStreetMap contributors</p>
          </div>
        </div>
      </div>
    </main>

    <script src="js/search.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/leaflet.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
